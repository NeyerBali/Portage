# Blueprint Render — déploiement de l'API .NET + PostgreSQL
# Doc : https://render.com/docs/blueprint-spec
# Pousse ce dépôt sur GitHub puis, dans Render : New + > Blueprint > sélectionne le repo.

databases:
  - name: porteo-db
    databaseName: porteo
    user: porteo
    plan: free

services:
  - type: web
    name: porteo-api
    runtime: docker
    plan: free
    dockerfilePath: ./crossone.porteo.erp/Dockerfile
    dockerContext: ./crossone.porteo.erp
    healthCheckPath: /swagger/index.html
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Clé de signature JWT (≥ 64 caractères pour HMAC-SHA512). À changer en vrai prod.
      - key: AppSettings__Token
        value: porteo_super_secret_jwt_signing_key_please_change_in_production_2026_0123456789
      # Chaîne de connexion fournie par la base ci-dessus (format URL postgres://… ,
      # normalisé automatiquement par l'API en chaîne Npgsql).
      - key: ConnectionStrings__CnxString
        fromDatabase:
          name: porteo-db
          property: connectionString
      # Relance des factures impayées toutes les 30 min (démo).
      - key: Scheduler__RelanceCron
        value: "0 0/30 * * * ?"
      # URL du front (liens reset / bienvenue dans les emails).
      - key: App__FrontUrl
        value: https://porteo-9cc53.web.app
      # Brevo (SMTP) — emails 2FA / bienvenue / reset.
      - key: Smtp__Host
        value: smtp-relay.brevo.com
      - key: Smtp__Port
        value: "587"
      - key: Smtp__Login
        value: a8425c001@smtp-brevo.com
      - key: Smtp__SenderEmail
        value: neyerbali6@gmail.com
      - key: Email__SenderName
        value: "Porteo"
      # Clé SMTP : NON versionnée — à saisir dans le dashboard Render (Environment).
      - key: Smtp__Password
        sync: false
      # Clé d'API Brevo (« xkeysib- ») : envoi via HTTP (port 443, non bloqué par Render).
      # NON versionnée — à saisir dans le dashboard Render (Environment).
      - key: Brevo__ApiKey
        sync: false
