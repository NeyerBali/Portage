<div class="shell">
  <!-- Sidebar : menu accordéon -->
  <aside class="cx-sidebar" [class.collapsed]="collapsed" [class.open]="mobileOpen">
    <!-- Brand -->
    <div class="cx-brand">
      <a class="cx-logo" routerLink="/dashboard" title="Portéo">
        <span class="cx-mark">P</span>
        <span class="cx-brand-name" *ngIf="!collapsed">Portéo</span>
      </a>
      <button type="button" class="cx-close" (click)="mobileOpen = false" aria-label="Fermer">✕</button>
    </div>

    <!-- Nav (étendu) -->
    <nav class="cx-nav cx-scroll" *ngIf="!collapsed">
      <div class="cx-group" *ngFor="let group of groups">
        <button type="button" class="cx-group-header" [class.has-active]="isGroupActive(group)"
                [attr.aria-expanded]="isGroupOpen(group)" (click)="toggleGroup(group)">
          <span class="cx-grp-ico icon {{group.icon}}" [class.active]="isGroupActive(group)"></span>
          <span class="cx-grp-label">{{ group.name }}</span>
          <span class="cx-chevron" [class.open]="isGroupOpen(group)"></span>
        </button>
        <div class="cx-collapser" [class.open]="isGroupOpen(group)">
          <div class="cx-collapser-inner">
            <div class="cx-items">
              <a class="cx-item" *ngFor="let child of group.children" [routerLink]="child.route"
                 [class.active]="isItemActive(child.route)" (click)="mobileOpen = false">
                <span class="cx-chip" [class.active]="isItemActive(child.route)">
                  <span class="icon {{child.icon}}" [class.active]="isItemActive(child.route)"></span>
                </span>
                <span class="cx-item-label">{{ child.label }}</span>
                <span class="cx-badge" *ngIf="badgeFor(child.route) > 0">{{ badgeFor(child.route) }}</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Rail (replié) -->
    <nav class="cx-rail cx-scroll" *ngIf="collapsed">
      <button type="button" class="cx-rail-btn" *ngFor="let group of groups"
              [class.active]="isGroupActive(group)" [title]="group.name" (click)="goToGroup(group)">
        <span class="icon {{group.icon}}" [class.active]="isGroupActive(group)"></span>
      </button>
    </nav>

    <!-- Footer profil -->
    <div class="cx-footer">
      <ng-container *ngIf="!collapsed; else railFooter">
        <div class="cx-profile">
          <span class="cx-avatar" [style.background]="getAvatarColor()" (click)="goToProfile()">{{ initials }}</span>
          <div class="cx-profile-meta" (click)="goToProfile()">
            <div class="cx-profile-name">{{ auth.fullName }}</div>
            <div class="cx-profile-sub">{{ roleLabel }}</div>
          </div>
          <button type="button" class="cx-iconbtn" title="Réduire le menu" (click)="toggleCollapse()"><span class="cx-panel-left"></span></button>
        </div>
        <div class="cx-footer-menu">
          <a class="cx-foot-action icon icon-setting" title="Paramètres" routerLink="/parametres" (click)="mobileOpen = false"></a>
          <a class="cx-foot-action icon icon-chart-2" title="Centre d'alerte" routerLink="/alertes" (click)="mobileOpen = false"></a>
          <button type="button" class="cx-foot-action danger-action" title="Déconnexion" (click)="logout()">⎋</button>
        </div>
      </ng-container>
      <ng-template #railFooter>
        <span class="cx-avatar" [style.background]="getAvatarColor()" (click)="goToProfile()" title="Mon profil">{{ initials }}</span>
        <button type="button" class="cx-rail-btn" title="Étendre le menu" (click)="toggleCollapse()">
          <span class="cx-panel-left cx-panel-left--right"></span>
        </button>
      </ng-template>
    </div>
  </aside>
  <div class="cx-backdrop" [class.show]="mobileOpen" (click)="mobileOpen = false"></div>

  <!-- Zone principale -->
  <div class="main">
    <header class="topbar">
      <button class="btn btn-icon btn-ghost mobile-only" (click)="mobileOpen = true">☰</button>

      <!-- Recherche -->
      <div class="searchbar-wrap">
        <div class="searchbar">
          <span class="s-ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
          <input type="text" placeholder="Rechercher une mission, un client, un consultant…"
                 [ngModel]="searchTerm" (ngModelChange)="onSearchInput($event)" (keyup.enter)="doSearch()" />
          <kbd>⌘K</kbd>
        </div>
        <div class="search-results" *ngIf="searchResults.length">
          <button class="search-row" *ngFor="let r of searchResults" (click)="goResult(r)">
            <span class="r-ic">{{ resultIcon(r.type) }}</span>
            <div class="r-body"><strong>{{ r.titre }}</strong><span class="caption text-subtle">{{ r.sousTitre }}</span></div>
            <span class="r-type">{{ r.type }}</span>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-2 ml-auto">
        <!-- Rôle (affichage) -->
        <span class="role-chip">{{ roleLabel }}</span>

        <!-- Palette -->
        <div class="dd">
          <button class="btn btn-icon btn-ghost" (click)="palettesOpen = !palettesOpen" title="Palette de couleurs">🎨</button>
          <div class="dd-menu" *ngIf="palettesOpen">
            <button *ngFor="let p of palettes" class="dd-row" (click)="setPalette(p.value)">
              <span class="sw" [style.background]="p.swatch"></span>{{ p.label }}
              <span *ngIf="theme.palette === p.value" class="check">✓</span>
            </button>
          </div>
        </div>

        <!-- Thème -->
        <button class="btn btn-icon btn-ghost" (click)="theme.toggleTheme()" title="Thème clair/sombre">
          {{ (theme.theme$ | async) === 'dark' ? '☀' : '☾' }}
        </button>

        <!-- Notifications -->
        <div class="dd">
          <button class="btn btn-icon btn-ghost bell" (click)="notifOpen = !notifOpen" title="Notifications">
            🔔<span class="dot" *ngIf="hasNotif"></span>
          </button>
          <div class="dd-menu right notif-panel" *ngIf="notifOpen">
            <div class="notif-head">Notifications</div>
            <div class="notif-item" *ngFor="let n of notifications">
              <span class="n-ic" [ngClass]="'t-' + n.type">●</span>
              <div class="n-body">
                <strong>{{ n.title }}</strong>
                <p class="caption text-muted">{{ n.detail }}</p>
                <span class="caption text-subtle">{{ n.when | date:'dd MMM yyyy' }}</span>
              </div>
            </div>
            <div class="notif-empty" *ngIf="!hasNotif">Aucune notification.</div>
          </div>
        </div>

        <!-- Menu utilisateur -->
        <div class="dd">
          <button class="user-btn" (click)="userMenuOpen = !userMenuOpen">
            <span class="avatar" style="background: var(--primary)">{{ initials }}</span>
            <span class="u-meta">
              <strong>{{ auth.fullName }}</strong>
              <small>{{ roleLabel }}</small>
            </span>
          </button>
          <div class="dd-menu right" *ngIf="userMenuOpen">
            <a class="dd-row" routerLink="/parametres" (click)="userMenuOpen = false">⚙ Paramètres</a>
            <button class="dd-row danger" (click)="logout()">⎋ Déconnexion</button>
          </div>
        </div>
      </div>
    </header>

    <main class="content">
      <!-- Fil d'Ariane -->
      <nav class="crumbs" *ngIf="crumbs.length > 1">
        <ng-container *ngFor="let c of crumbs; let i = index">
          <span class="sep" *ngIf="i > 0">›</span>
          <a *ngIf="c.link" [routerLink]="c.link">{{ c.label }}</a>
          <b *ngIf="!c.link">{{ c.label }}</b>
        </ng-container>
      </nav>

      <router-outlet></router-outlet>
    </main>
  </div>
</div>
