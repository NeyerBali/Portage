<div class="page fade-in">
  <header class="page-head flex items-center justify-between wrap gap-4">
    <div>
      <p class="overline">Facturation</p>
      <h1 class="h2">Factures</h1>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-secondary" (click)="exportXlsx()">⤓ Excel</button>
      <button class="btn btn-secondary" (click)="exportCsv()">⤓ CSV</button>
      <button *ngIf="isAdmin" class="btn btn-primary" (click)="create()">＋ Nouvelle facture</button>
    </div>
  </header>

  <!-- KPIs -->
  <section class="grid kpis">
    <div class="card card-pad kpi"><div class="kpi-value">{{ encaisse | number:'1.0-0' }} €</div><div class="kpi-label">Encaissé</div></div>
    <div class="card card-pad kpi"><div class="kpi-value">{{ emis | number:'1.0-0' }} €</div><div class="kpi-label">Émis en attente</div></div>
    <div class="card card-pad kpi"><div class="kpi-value" style="color: var(--error-600)">{{ retard | number:'1.0-0' }} €</div><div class="kpi-label">En retard</div></div>
  </section>

  <div class="card card-pad">
    <div class="segmented mb-4">
      <button [class.active]="!statutFilter" (click)="statutFilter=null">Toutes</button>
      <button *ngFor="let s of statuts" [class.active]="statutFilter===s.value" (click)="statutFilter=s.value">{{ s.label }}</button>
    </div>

    <app-data-table [columns]="tableColumns" [rows]="byStatut" [pageSize]="8" [clickable]="true"
                    searchPlaceholder="Rechercher une facture…" (rowClick)="open($event)">
      <ng-template [appColumnCell]="'numero'" let-f><span class="mono">{{ f.numero }}</span></ng-template>
      <ng-template [appColumnCell]="'statut'" let-f>
        <app-status-badge *ngIf="!isOverdue(f)" [status]="f.statut" kind="facture"></app-status-badge>
        <span *ngIf="isOverdue(f)" class="badge overdue"><span class="dot"></span>En retard</span>
      </ng-template>
      <ng-template [appColumnCell]="'actions'" let-f>
        <div class="row-actions" (click)="$event.stopPropagation()">
          <button class="btn btn-icon btn-ghost" title="Voir" (click)="open(f)">👁</button>
          <button class="btn btn-icon btn-ghost" title="Télécharger le PDF" (click)="downloadPdf(f)">⤓</button>
          <button *ngIf="isAdmin && f.statut === 'emise'" class="btn btn-icon btn-ghost" title="Relancer" (click)="relance(f)">✉</button>
          <button *ngIf="isAdmin && f.statut !== 'payee'" class="btn btn-icon btn-ghost" title="Marquer payée" (click)="markPaid(f)">✓</button>
          <button *ngIf="isAdmin" class="btn btn-icon btn-ghost" title="Supprimer" (click)="remove(f)">🗑</button>
        </div>
      </ng-template>
    </app-data-table>

    <div *ngIf="loading" class="loading-row"><span class="spin"></span> Chargement…</div>
  </div>
</div>
