<div class="auth-shell">
  <app-auth-aside></app-auth-aside>

  <main class="auth-main">
    <div class="auth-card fade-in">
      <h1>Connexion</h1>
      <p class="sub">Accédez à votre espace Portéo.</p>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="field" [class.invalid]="f.email.touched && f.email.invalid">
          <label>Adresse e-mail <span class="req">*</span></label>
          <input type="email" formControlName="email" placeholder="vous@entreprise.fr" autocomplete="username" />
          <div class="field-error" *ngIf="f.email.touched && f.email.errors?.['required']">⚠ L'adresse e-mail est requise.</div>
          <div class="field-error" *ngIf="f.email.touched && f.email.errors?.['email']">⚠ Format d'e-mail invalide.</div>
        </div>

        <div class="field" [class.invalid]="f.password.touched && f.password.invalid">
          <label>Mot de passe <span class="req">*</span></label>
          <div class="pw">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••••" autocomplete="current-password" />
            <button type="button" class="pw-toggle" (click)="showPassword = !showPassword">{{ showPassword ? '🙈' : '👁' }}</button>
          </div>
          <div class="field-error" *ngIf="f.password.touched && f.password.errors?.['required']">⚠ Le mot de passe est requis.</div>
        </div>

        <div class="flex items-center justify-between mb-4">
          <label class="remember"><input type="checkbox" formControlName="remember" /> Se souvenir de moi</label>
          <a class="link" routerLink="/auth/forgot">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" [disabled]="loading">
          <span *ngIf="!loading">Se connecter</span>
          <span *ngIf="loading" class="spin"></span>
        </button>
      </form>

      <p class="auth-foot-link">Première connexion ? <a class="link" routerLink="/auth/first">Définir mon mot de passe</a></p>

      <div class="demo">
        <p class="overline">Comptes de démonstration</p>
        <div class="flex gap-2">
          <button class="btn btn-secondary btn-sm grow" (click)="fill('admin')">👤 Admin</button>
          <button class="btn btn-secondary btn-sm grow" (click)="fill('consultant')">🧑‍💻 Consultant</button>
        </div>
        <p class="caption text-subtle mt-2">admin&#64;porteo.dev · consultant&#64;porteo.dev — mot de passe : Porteo2026!</p>
      </div>
    </div>
  </main>
</div>
