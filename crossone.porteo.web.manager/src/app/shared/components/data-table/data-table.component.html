<div class="dt">
  <div class="dt-toolbar" *ngIf="searchable">
    <div class="dt-search">
      <span class="dt-search-ic">⌕</span>
      <input type="text" [(ngModel)]="search" (ngModelChange)="onSearch()" [placeholder]="searchPlaceholder" />
    </div>
    <span class="dt-count">{{ total }} ligne{{ total > 1 ? 's' : '' }}</span>
  </div>

  <div class="dt-wrap cx-scroll">
    <table class="dt-table">
      <thead>
        <tr>
          <th *ngFor="let c of columns" [class.num]="c.align === 'right'" [class.sortable]="c.sortable" (click)="sort(c)">
            {{ c.label }}<span class="dt-sort" *ngIf="c.sortable">{{ sortIcon(c) }}</span>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of paged" [class.clickable]="clickable" (click)="clickable && rowClick.emit(row)">
          <td *ngFor="let c of columns" [class.num]="c.align === 'right'">
            <ng-container *ngIf="templateFor(c.key) as tpl; else fmt">
              <ng-container *ngTemplateOutlet="tpl; context: { $implicit: row, row: row }"></ng-container>
            </ng-container>
            <ng-template #fmt [ngSwitch]="c.format">
              <span *ngSwitchCase="'currency'">{{ $any(row)[c.key] | number:'1.0-2' }} €</span>
              <span *ngSwitchCase="'number'">{{ $any(row)[c.key] | number }}</span>
              <span *ngSwitchCase="'date'">{{ $any(row)[c.key] | date:'dd/MM/yy' }}</span>
              <span *ngSwitchDefault>{{ $any(row)[c.key] }}</span>
            </ng-template>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="dt-empty" *ngIf="!total">Aucune donnée.</div>
  </div>

  <div class="dt-foot" *ngIf="pageCount > 1">
    <span class="dt-range">{{ from }}–{{ to }} sur {{ total }}</span>
    <div class="dt-pager">
      <button class="dt-pg" [disabled]="page === 1" (click)="goPage(page - 1)">‹</button>
      <span class="dt-pg-info">{{ page }} / {{ pageCount }}</span>
      <button class="dt-pg" [disabled]="page === pageCount" (click)="goPage(page + 1)">›</button>
    </div>
  </div>
</div>
